services:
  plex-mcp:
    image: ghcr.io/carldog/plex-mcp:latest
    pull_policy: always
    container_name: plex-mcp
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3001}:3000"
    environment:
      MCP_PORT: "3000"
      PLEX_URL: "${PLEX_URL}"
      PLEX_TOKEN: "${PLEX_TOKEN}"
      # Optional HTTPS — pick ONE of the two modes below.
      #
      # (a) Self-managed cert (recommended for LAN-only deployment):
      #     MCP_TLS: "auto"
      #     MCP_TLS_DIR: "/data/certs"              # mount a volume here to persist
      #     MCP_TLS_SAN: "DNS:carldog-nas,IP:127.0.0.1"
      #     MCP_TLS_CN: "carldog-nas"               # optional; defaults to first DNS SAN
      #     MCP_TLS_DAYS: "365"                     # optional; rotates when <30 days remain
      #
      # (b) Bring-your-own cert (Let's Encrypt, internal CA, etc.):
      #     MCP_TLS_CERT_FILE: "/certs/fullchain.pem"
      #     MCP_TLS_KEY_FILE:  "/certs/privkey.pem"
      #
      # When TLS is on, switch the healthcheck below to wget --no-check-certificate
      # against https://localhost:3000/health.
    volumes:
      # plex_save_image output directory. Files written under
      # /data/images inside the container land at the host path
      # below, which is also exposed by filesystem-mcp at
      # /media/_mcp-scratch — closing the loop for the
      # plex_search → plex_save_image → filesystem-mcp pipeline.
      # Override the in-container path with MCP_IMAGE_SAVE_DIR if
      # you want it elsewhere.
      - /volume1/Media/_mcp-scratch:/data/images
      # Optional HTTPS cert volume (commented). Self-managed persists
      # across restarts; BYO is read-only.
      # - ./certs:/data/certs
      # - ./certs:/certs:ro
    extra_hosts:
      # Lets the container reach Plex when it's running on the same host.
      # Use PLEX_URL=http://host.docker.internal:32400 in that case.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      # Cap container log size and rotate. With max-size=10m and
      # max-file=3, total log usage stays under ~30MB; oldest files are
      # automatically deleted when the limit is hit. Logs themselves go
      # to stderr (per the application's logging convention) and Docker
      # captures them via the json-file driver.
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
