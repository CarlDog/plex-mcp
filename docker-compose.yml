services:
  plex-mcp:
    image: ghcr.io/carldog/plex-mcp:latest
    pull_policy: always
    container_name: plex-mcp
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3001}:3000"
    environment:
      MCP_PORT: "3000"
      PLEX_URL: "${PLEX_URL}"
      PLEX_TOKEN: "${PLEX_TOKEN}"
    extra_hosts:
      # Lets the container reach Plex when it's running on the same host.
      # Use PLEX_URL=http://host.docker.internal:32400 in that case.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      # Cap container log size and rotate. With max-size=10m and
      # max-file=3, total log usage stays under ~30MB; oldest files are
      # automatically deleted when the limit is hit. Logs themselves go
      # to stderr (per the application's logging convention) and Docker
      # captures them via the json-file driver.
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
