services:
  plex-mcp:
    image: ghcr.io/carldog/plex-mcp:latest
    pull_policy: always
    container_name: plex-mcp
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3001}:3000"
    environment:
      MCP_PORT: "3000"
      PLEX_URL: "${PLEX_URL}"
      PLEX_TOKEN: "${PLEX_TOKEN}"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
